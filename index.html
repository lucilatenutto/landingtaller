<!DOCTYPE html>
<html lang="es">
<head>

    <title>Olga Rock Day</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">OLGA</div>
    </header>

    <main>

            <h1>OLGA <br> ROCK DAY</h1>
            <p class="subtitle">EL POGO DIGITAL. EL ROCK VIVE EN LA CALLE Y EN TU PANTALLA.</p>
            <a href="#registro" class="cta-button">QUIERO SUMARME AHORA</a>
        </section>

        <section class="info">
            <div class="paper-clip">
                <h2>¿DE QUÉ SE TRATA?</h2>
                <p>Bandas en vivo + Visuales en tiempo real + Mural Digital. Gratis. Calle. Pogo.</p>
            </div>
        </section>

        <section id="registro" class="mural">
            <h3>MURAL DIGITAL</h3>
            <form>
                <input type="text" placeholder="Dejá tu mensaje (estilo graffiti)...">
                <button type="submit" class="btn-graffiti">GRAFFITEAR</button>
            </form>
        </section>
    </main>
